<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Bookmark Saver</title>
</head>
<body>

    <div class="cont">
        <h2>Bookmark Saver</h2>

        <form id="bookmark-form" action="submit">
            <input type="text" id="text-input" required>
            <input type="link" id="link-input" required>

            <button id="add-btn">Add Bookmark</button>
        </form>

        <div id="bookmark-list">

        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
